<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>女子寮談話室 - ひみつの掲示板</title>
    <!-- 簡単なスタイルを追加して掲示板っぽくするよ -->
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* 上寄せ */
            min-height: 100vh; /* 画面いっぱいの高さ */
        }
        #app-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 700px; /* 少し広めに */
            width: 100%;
            box-sizing: border-box;
            margin-top: 20px; /* 上部に少し余白 */
        }
        h1 {
            color: #8c002f; /* 女子寮っぽい色 */
            text-align: center;
            margin-bottom: 25px;
            font-size: 2.2em;
        }
        hr {
            border: none;
            border-top: 1px dashed #ccc;
            margin: 25px 0;
        }
        #auth-status, #message-input-area {
            text-align: center;
            margin-bottom: 20px;
        }
        #user-name {
            font-weight: bold;
            color: #555;
        }
        input[type="text"], button {
            padding: 10px 15px;
            margin: 5px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }
        button {
            background-color: #8c002f;
            color: white;
            cursor: pointer;
            transition: background-color 0.2s ease-in-out;
            border: none;
        }
        button:hover {
            background-color: #a30037;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        #messages {
            max-height: 400px; /* スクロール可能にする */
            overflow-y: auto;
            border: 1px solid #eee;
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 8px;
            text-align: left;
        }
        /* メッセージごとのコンテナスタイル */
        .message-item-container {
            display: flex; /* Flexboxを使って要素を横に並べる */
            align-items: center; /* 縦方向中央揃え */
            justify-content: space-between; /* 要素を両端に寄せる */
            margin: 8px 0;
            padding: 5px 10px;
            background-color: #e6eefc;
            border-left: 4px solid #8c002f;
            border-radius: 4px;
            word-wrap: break-word;
        }
        .message-item-container:nth-child(even) {
            background-color: #f5f8ff;
        }
        .message-item-container .message-content { /* メッセージ本文の部分 */
            flex-grow: 1; /* メッセージ本文が広がるように */
            margin-right: 10px; /* ボタンとの間にスペース */
        }
        .delete-button {
            background-color: #f44336; /* 赤色のボタン */
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
            margin-left: 10px; /* メッセージとの間に少しスペース */
            flex-shrink: 0; /* ボタンのサイズが縮まらないように */
        }
        .delete-button:hover {
            background-color: #d32f2f;
        }
        #reset-messages-button { /* 全削除ボタンのスタイル */
            background-color: #ff9800;
            margin-top: 20px;
        }
        #reset-messages-button:hover {
            background-color: #fb8c00;
        }
    </style>
</head>
<body>
    <div id="app-container">
        <h1>ようこそ、女子寮談話室へ！</h1>

        <div id="auth-status">
            <p>現在のユーザー：<span id="user-name">名無しさん</span></p>
            <input type="text" id="name-input" placeholder="名前を変更" />
            <button id="change-name-button">名前を変更</button>
            <button id="sign-in-button">入室する（匿名ログイン）</button>
            <button id="sign-out-button" style="display:none;">退室する</button>
        </div>

        <hr>

        <div id="messages">
            <!-- ここにメッセージが表示されるよ -->
            <p>入室するとメッセージが見れます。</p>
        </div>

        <hr>

        <div id="message-input-area">
            <input type="text" id="message-text-input" placeholder="メッセージを入力" />
            <button id="send-message-button">送信</button>
        </div>

        <!-- ★ここから追加: ホスト用の全メッセージ削除ボタン -->
        <div style="text-align: center; margin-top: 20px;">
            <button id="reset-messages-button" style="display:none;">全メッセージをリセット</button>
        </div>
        <!-- ★ここまで追加 -->
    </div>

    <!-- Firebase SDK のロードと初期化 -->
    <script type="module">
      // Import the functions you need from the SDKs you need
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
      import { getAuth, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
      // ★ collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, getDoc, deleteDoc, getDocs, writeBatch をインポート
      import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, getDoc, deleteDoc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      // Your web app's Firebase configuration
      // ★★★★★ ここをきみのFirebaseプロジェクトの情報に置き換えること！ ★★★★★
      const firebaseConfig = {
        apiKey: "AIzaSyCzAdTI-YKCNx0dTxwDmrV93lO3RYzCE20", // きみのAPIキーに置き換えてね
        authDomain: "freeboard-cdbe3.firebaseapp.com", // きみのauthDomainに置き換えてね (例: freeboard-cdbe3.firebaseapp.com)
        projectId: "freeboard-cdbe3", // きみのprojectIdに置き換えてね (例: freeboard-cdbe3)
        storageBucket: "freeboard-cdbe3.firebasestorage.app", // きみのstorageBucketに置き換えてね
        messagingSenderId: "1016558818075", // きみのmessagingSenderIdに置き換えてね
        appId: "1:1016558818075:web:d72badba8a66e46bbd79be", // きみのappIdに置き換えてね
        measurementId: "G-YTRXM9MDLM" // きみのmeasurementId (G-XXXXXX) に置き換えてね
      };

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);

      // Firebase Authentication サービスを初期化
      const auth = getAuth(app);
      // Cloud Firestore サービスを初期化
      const db = getFirestore(app);

      // --- HTML要素を取得 ---
      const userNameSpan = document.getElementById('user-name');
      const nameInput = document.getElementById('name-input');
      const changeNameButton = document.getElementById('change-name-button');
      const signInButton = document.getElementById('sign-in-button');
      const signOutButton = document.getElementById('sign-out-button');
      const messagesDiv = document.getElementById('messages');
      const messageTextInput = document.getElementById('message-text-input');
      const sendMessageButton = document.getElementById('send-message-button');
      const resetMessagesButton = document.getElementById('reset-messages-button'); // ★追加: 全削除ボタンの要素を取得

      let currentUser = null; // 現在のユーザー情報
      let hostUid = null; // ★追加: ホストのUIDをここに保存する
      let messageUnsubscribe = null; // メッセージリスナーを停止するための変数

      // --- 認証機能 ---

      // 匿名ログイン
      signInButton.addEventListener('click', async () => {
          try {
              await signInAnonymously(auth);
              console.log("匿名ログインしました！");
          } catch (error) {
              console.error("匿名ログインエラー:", error);
              alert("入室できませんでした。もう一度試してください。");
          }
      });

      // ログアウト
      signOutButton.addEventListener('click', async () => {
          try {
              await signOut(auth); // auth.signOut() から signOut(auth) に変更 (推奨の書き方)
              console.log("退室しました。");
          } catch (error) {
              console.error("ログアウトエラー:", error);
          }
      });

      // ログイン状態の変化を監視する
      onAuthStateChanged(auth, async (user) => { // ★async を追加
          if (user) {
              // ログイン中
              currentUser = user;
              await setupHostUid(); // ★追加: ホストUIDの読み込み
              fetchUserName(user.uid); // Firestoreからユーザー名を取得
              signInButton.style.display = 'none';
              signOutButton.style.display = 'inline-block';
              nameInput.disabled = false;
              changeNameButton.disabled = false;
              messageTextInput.disabled = false;
              sendMessageButton.disabled = false;

              // ホストの場合のみ全削除ボタンを表示 ★追加
              if (currentUser.uid === hostUid) { // ★修正: hostUid を使用
                  resetMessagesButton.style.display = 'inline-block';
              } else {
                  resetMessagesButton.style.display = 'none';
              }

              // ログインしたらメッセージのリアルタイム表示を開始
              setupMessageListener(user); 
          } else {
              // ログアウト中
              currentUser = null;
              userNameSpan.textContent = '名無しさん';
              nameInput.value = '';
              signInButton.style.display = 'inline-block';
              signOutButton.style.display = 'none';
              nameInput.disabled = true;
              changeNameButton.disabled = true;
              messageTextInput.disabled = true;
              sendMessageButton.disabled = true;
              messagesDiv.innerHTML = '<p>入室するとメッセージが見れます。</p>'; // ログアウト時はメッセージを非表示

              // ログアウトしたらメッセージリスナーを停止
              if (messageUnsubscribe) {
                  messageUnsubscribe();
                  messageUnsubscribe = null;
              }
              resetMessagesButton.style.display = 'none'; // ★追加: ログアウトしたらボタンを隠す
          }
      });

      // ユーザー名を変更する
      changeNameButton.addEventListener('click', async () => {
          if (currentUser && nameInput.value.trim() !== '') {
              const newName = nameInput.value.trim();
              await setDoc(doc(db, "users", currentUser.uid), { displayName: newName }, { merge: true });
              userNameSpan.textContent = newName;
              nameInput.value = ''; // 入力欄をクリア
              console.log("名前を変更しました:", newName);
          } else {
              alert("ログインしているか、新しい名前が入力されているか確認してください。");
          }
      });

      // Firestoreからユーザー名を取得する関数
      async function fetchUserName(uid) {
          const userDocRef = doc(db, "users", uid);
          const userDocSnap = await getDoc(userDocRef);
          if (userDocSnap.exists()) {
              userNameSpan.textContent = userDocSnap.data().displayName || '名無しさん';
          } else {
              // まだユーザー名が設定されていない場合、デフォルト名でFirestoreに保存しておく
              await setDoc(doc(db, "users", uid), { displayName: '名無しさん' }, { merge: true });
              userNameSpan.textContent = '名無しさん';
          }
      }

      // ★追加: FirestoreからホストのUIDを読み込む関数
      async function setupHostUid() {
          const hostDocRef = doc(db, "settings", "host");
          const hostDocSnap = await getDoc(hostDocRef);
          if (hostDocSnap.exists()) {
              hostUid = hostDocSnap.data().uid;
              console.log("ホストUIDを読み込みました:", hostUid);
          } else {
              console.warn("settings/host ドキュメントが見つかりません。ホストUIDが設定されていません。");
          }
      }

      // --- メッセージ機能 ---

      // メッセージ送信
      sendMessageButton.addEventListener('click', async () => {
          if (currentUser && messageTextInput.value.trim() !== '') {
              const messageText = messageTextInput.value.trim();
              const displayName = userNameSpan.textContent; // 現在の表示名を使用

              try {
                  await addDoc(collection(db, "messages"), {
                      text: messageText,
                      authorUid: currentUser.uid,
                      authorName: displayName, // 送信時の名前を保存
                      timestamp: serverTimestamp() // Firebaseのサーバー時間で記録
                  });
                  messageTextInput.value = ''; // 入力欄をクリア
                  console.log("メッセージを送信しました。");
              } catch (error) {
                  console.error("メッセージ送信エラー:", error);
                  alert("メッセージを送信できませんでした。");
              }
          } else {
              alert("入室しているか、メッセージが入力されているか確認してください。");
          }
      });

      // メッセージのリアルタイム表示リスナーを設定する関数
      function setupMessageListener(user) {
        // 既存のリスナーがあれば停止
        if (messageUnsubscribe) {
            messageUnsubscribe();
        }

        // "messages"コレクションへのクエリを作成 (timestampの降順で取得)
        const q = query(collection(db, "messages"), orderBy("timestamp", "desc"));

        // リアルタイムリスナーを設定
        messageUnsubscribe = onSnapshot(q, (snapshot) => {
            messagesDiv.innerHTML = ''; // 一度既存のメッセージをクリア
            if (snapshot.empty) {
                messagesDiv.innerHTML = '<p>まだメッセージはありません。</p>';
                return;
            }
            const messages = [];
            snapshot.forEach((doc) => {
                messages.push({ id: doc.id, ...doc.data() }); // ドキュメントIDも保存
            });
            // 古いメッセージから表示するために逆順にする (orderBy("asc")と同じ効果)
            messages.reverse().forEach(message => {
                const messageContainer = document.createElement('div'); // メッセージごとのコンテナ
                messageContainer.classList.add('message-item-container');

                const messageTextSpan = document.createElement('span');
                messageTextSpan.classList.add('message-content'); // スタイル適用のためクラスを追加
                // タイムスタンプを日付のみで整形
                const dateOnly = message.timestamp && typeof message.timestamp.toDate === 'function'
                    ? new Date(message.timestamp.toDate()).toLocaleDateString('ja-JP') // 日付のみ
                    : '日付不明';
                messageTextSpan.textContent = `${message.authorName} (${dateOnly}): ${message.text}`;
                messageContainer.appendChild(messageTextSpan);

                // 自分の投稿なら削除ボタンを追加
                if (user && user.uid === message.authorUid) { // ログインユーザーと投稿者が一致する場合
                    const deleteButton = document.createElement('button');
                    deleteButton.textContent = '削除';
                    deleteButton.classList.add('delete-button'); // CSSクラスを追加
                    deleteButton.addEventListener('click', async () => {
                        if (confirm('本当にこのメッセージを削除しますか？')) {
                            try {
                                await deleteDoc(doc(db, "messages", message.id)); // message.id を使って削除
                                console.log("メッセージを削除しました。");
                            } catch (error) {
                                console.error("メッセージ削除エラー:", error);
                                alert("メッセージを削除できませんでした。");
                            }
                        }
                    });
                    messageContainer.appendChild(deleteButton);
                }
                messagesDiv.appendChild(messageContainer);
            });
            // 最新のメッセージが見えるようにスクロール
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });
      }

      // ★追加: 全メッセージリセット機能
      resetMessagesButton.addEventListener('click', async () => {
          if (currentUser && currentUser.uid === hostUid) { // ホストユーザーのみ実行可能
              if (confirm('本当にすべてのメッセージを削除しますか？この操作は元に戻せません！')) {
                  try {
                      // messagesコレクションのすべてのドキュメントを取得
                      const messagesSnapshot = await getDocs(collection(db, "messages"));
                      // バッチ処理で一括削除
                      const batch = writeBatch(db);
                      messagesSnapshot.forEach((msgDoc) => {
                          batch.delete(msgDoc.ref);
                      });
                      await batch.commit();
                      console.log("すべてのメッセージが削除されました！");
                      alert("すべてのメッセージを削除しました。");
                  } catch (error) {
                      console.error("全メッセージ削除エラー:", error);
                      alert("すべてのメッセージを削除できませんでした。");
                  }
              }
          } else {
              alert("この機能はホストユーザーのみ利用できます。");
          }
      });

      console.log("Firebaseが初期化され、掲示板スクリプトがロードされました！");
    </script>
</body>
</html>
