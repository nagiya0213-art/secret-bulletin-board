<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>女子寮談話室 - 掲示板</title>
    <!-- 簡単なスタイルを追加して掲示板っぽくするよ -->
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* 上寄せ */
            min-height: 100vh; /* 画面いっぱいの高さ */
        }
        #app-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 700px; /* 少し広めに */
            width: 100%;
            box-sizing: border-box;
            margin-top: 20px; /* 上部に少し余白 */
        }
        h1 {
            color: #8c002f; /* 女子寮っぽい色 */
            text-align: center;
            margin-bottom: 25px;
            font-size: 2.2em;
        }
        hr {
            border: none;
            border-top: 1px dashed #ccc;
            margin: 25px 0;
        }
        #auth-status, #message-input-area {
            text-align: center;
            margin-bottom: 20px;
        }
        #user-name {
            font-weight: bold;
            color: #555;
        }
        input[type="text"], button {
            padding: 10px 15px;
            margin: 5px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }
        button {
            background-color: #8c002f;
            color: white;
            cursor: pointer;
            transition: background-color 0.2s ease-in-out;
            border: none;
        }
        button:hover {
            background-color: #a30037;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        #messages {
            max-height: 400px; /* スクロール可能にする */
            overflow-y: auto;
            border: 1px solid #eee;
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 8px;
            text-align: left;
        }
        /* メッセージごとのコンテナスタイル */
        .message-item-container {
            display: flex; /* Flexboxを使って要素を横に並べる */
            align-items: center; /* 縦方向中央揃え */
            justify-content: space-between; /* 要素を両端に寄せる */
            margin: 8px 0;
            padding: 5px 10px;
            background-color: #e6eefc;
            border-left: 4px solid #8c002f;
            border-radius: 4px;
            word-wrap: break-word;
        }
        .message-item-container:nth-child(even) {
            background-color: #f5f8ff;
        }
        .message-item-container span {
            flex-grow: 1; /* メッセージ本文が広がるように */
            margin-right: 10px; /* ボタンとの間にスペース */
        }
        .delete-button {
            background-color: #f44336; /* 赤色のボタン */
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
            margin-left: 10px;
        }
        .delete-button:hover {
            background-color: #d32f2f;
        }
    </style>
</head>
<body>
    <div id="app-container">
        <h1>ようこそ、女子寮談話室へ！</h1>

        <div id="auth-status">
            <p>現在のユーザー：<span id="user-name">名無しさん</span></p>
            <input type="text" id="name-input" placeholder="名前を変更" />
            <button id="change-name-button">名前を変更</button>
            <button id="sign-in-button">入室する（匿名ログイン）</button>
            <button id="sign-out-button" style="display:none;">退室する</button>
        </div>

        <hr>

        <div id="messages">
            <!-- ここにメッセージが表示されるよ -->
            <p>入室するとメッセージが見れます。</p>
        </div>

        <hr>

        <div id="message-input-area">
            <input type="text" id="message-text-input" placeholder="メッセージを入力" />
            <button id="send-message-button">送信</button>
        </div>
    </div>

      });

                  alert("ログインしているか、新しい名前が入力されているか確認してください。");
              }
          });
          console.log("changeNameButton event listener attached.");
      } else {
          console.error("changeNameButton not found, cannot attach event listener.");
      }

          }
      }
